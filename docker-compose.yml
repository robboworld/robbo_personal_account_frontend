# ЛК frontend + локальный Scratch player (robboscratch3_gui с embed-плеером).
name: robbo_personal_account_frontend

services:
  web:
    restart: unless-stopped
    build: .
    command: yarn start
    stdin_open: true
    ports:
      - "3030:3030"
    environment:
      - PORT=3030
      - HOST=0.0.0.0
    network_mode: "host"
    depends_on:
      - scratch-gui

  scratch-gui:
    image: robboscratch-gui:local
    build:
      context: ../robboscratch3_gui
    restart: unless-stopped
    ports:
      - "5001:80"
