# Стабильное имя проекта; после docker compose build нужен up --build, иначе контейнер
# остаётся на старом image id.
name: robbo_personal_account_frontend

services:
  web:
    restart: unless-stopped
    build: .
    command: yarn start
    stdin_open: true
    ports:
      - "3030:3030"
    environment:
      - PORT=3030
      - HOST=0.0.0.0
    network_mode: "host"
