# ЛК frontend + локальный Scratch player (robboscratch3_gui с embed-плеером).
# Без network_mode: host — на Docker Desktop (macOS/Windows) host-network не
# публикует порты на localhost хоста; bridge + ports работает и на Linux.
name: robbo_personal_account_frontend

services:
  web:
    restart: unless-stopped
    build: .
    # ENTRYPOINT in Dockerfile is already `yarn start --port 3030`; do not set
    # `command: yarn start` or the process becomes `yarn start --port 3030 yarn start` and exits 1.
    stdin_open: true
    ports:
      - "3030:3030"
    environment:
      - PORT=3030
      - HOST=0.0.0.0
    depends_on:
      - scratch-gui

  scratch-gui:
    image: robboscratch-gui:local
    build:
      context: ../robboscratch3_gui
    restart: unless-stopped
    ports:
      - "5001:80"
